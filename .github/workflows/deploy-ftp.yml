name: Deploy to lkit.lorrrem.ru (FTP)

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-ftp.yml"
  workflow_dispatch: {}

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (site assets only, skip long-named screenshots)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            site/index.html
            site/styles.css
            site/app.js
            site/catalog-data.js
            site/dictionary-data.js
          sparse-checkout-cone-mode: false

      - name: Deploy site/ to production via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./site/
          server-dir: ./
          exclude: |
            **/screenshots/**
            **/.git*
            **/.git*/**
            **/.DS_Store
