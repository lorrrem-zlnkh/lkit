name: Weekly content

on:
  schedule:
    # Every Saturday at 10:00 Europe/Moscow, expressed in UTC.
    - cron: "0 7 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-content
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
      WEEKLY_SOURCES: all
      WEEKLY_LIMIT: 40
      WEEKLY_QUOTA_PER_CATEGORY: 20
      WEEKLY_CASE_LIMIT_PER_SOURCE: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Collect weekly cases with OpenAI
        run: npm run weekly:collect

      - name: Export weekly data for the static site
        run: npm run weekly:export

      - name: Commit and publish weekly data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/weekly-data.js
          if git diff --cached --quiet; then
            echo "No weekly content changes to publish."
            exit 0
          fi
          git commit -m "Update weekly content"
          git push origin HEAD:${{ github.ref_name }}
